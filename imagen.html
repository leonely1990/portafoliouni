<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .caja {
            display: flex;
            flex-flow: column nowrap;
            border: 1px solid #dedede;
            text-align: center;
            width: 50%;
            border-radius: 10px;
            box-shadow: 2px 2px 3px #d1d1d1;
        }
        .content_image {
            align-self: center;
            flex-grow: 1;
            width: 95%;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .content_image_img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .content_desc {
            background-color: #dbe6f4;
            padding: 5px 10px;
            border-bottom-left-radius: 5px;
            border-bottom-right-radius: 5px;
        }
        .content_desc p {
            color: #4d4d4d;
        }
    </style>
</head>
<body>
    <div class="caja">
        <div class="content_image">
            <img src="imagenes_sd4/Captura01.PNG" alt="" class="content_image_img">
        </div>
        <div class="content_desc">
            <p>Creacion de la maquina virtual en VirtualBox</p>
        </div>
    </div>
</body>
</html>
